name: Deploy custom code

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-liderdent-production
      cancel-in-progress: false

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Backup current theme
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          port: ${{ secrets.SERVER_PORT }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -euo pipefail
            TIMESTAMP=$(date +%s)
            BACKUP_DIR="/tmp/liderdent-deploy-backups/$TIMESTAMP"
            THEME_PATH="${{ secrets.SERVER_PATH }}/wp-content/themes/dental"
            mkdir -p "$BACKUP_DIR"
            if [ -d "$THEME_PATH" ]; then
              rsync -a "$THEME_PATH/" "$BACKUP_DIR/" --exclude=node_modules --exclude=.git
              echo "Backup saved to $BACKUP_DIR"
            else
              echo "Theme directory not found, skipping backup"
            fi

      - name: Upload custom code bundle
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          port: ${{ secrets.SERVER_PORT }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "wp-content/themes/dental,scripts"
          target: "/tmp/liderdent-deploy-${{ github.run_id }}"

      - name: Sync custom code into WordPress
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          port: ${{ secrets.SERVER_PORT }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -euo pipefail

            STAGING="/tmp/liderdent-deploy-${{ github.run_id }}"
            TARGET="${{ secrets.SERVER_PATH }}"
            THEME_TARGET="$TARGET/wp-content/themes/dental"

            if [ ! -d "$STAGING/wp-content/themes/dental" ]; then
              echo "ERROR: staging bundle missing at $STAGING"
              exit 1
            fi

            bash "$STAGING/scripts/verify-deploy-bundle.sh" "$STAGING" "staging"

            mkdir -p "$TARGET/wp-content/themes"
            rsync -a --delete "$STAGING/wp-content/themes/dental/" "$THEME_TARGET/"

            bash "$STAGING/scripts/verify-deploy-bundle.sh" "$TARGET" "production"

            chown -R liderdent:liderdent "$THEME_TARGET"

            echo "::group::Plugin updates"
            cd "$TARGET"
            wp --allow-root plugin update --all --quiet || echo "[warn] plugin update skipped"
            echo "::endgroup::"

            echo "::group::Cache flush"
            wp --allow-root cache flush --quiet 2>/dev/null || true
            wp --allow-root super-cache flush --quiet 2>/dev/null || true
            echo "::endgroup::"

            rm -rf "$STAGING"
            find /tmp -maxdepth 1 -type d -name 'liderdent-deploy-*' -mtime +2 -exec rm -rf {} + 2>/dev/null || true

      - name: Cleanup old backups (keep last 10)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          port: ${{ secrets.SERVER_PORT }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -euo pipefail
            BACKUP_ROOT="/tmp/liderdent-deploy-backups"
            if [ -d "$BACKUP_ROOT" ]; then
              ls -dt "$BACKUP_ROOT"/*/ 2>/dev/null | tail -n +11 | xargs -r rm -rf
              echo "Backup cleanup done. Remaining:"
              ls -d "$BACKUP_ROOT"/*/ 2>/dev/null | wc -l
            else
              echo "No backup directory found, skipping cleanup"
            fi
